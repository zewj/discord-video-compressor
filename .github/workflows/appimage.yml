# Builds AppImages for x86_64 and aarch64 on tag push (e.g. v1.8.0) and
# attaches both to the corresponding GitHub Release. The aarch64 job uses
# GitHub's native ARM Linux runner — no QEMU needed.

name: AppImage

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to attach the AppImage to (e.g. v1.8.0)'
        required: true

permissions:
  contents: write   # needed for softprops/action-gh-release to upload

jobs:
  appimage:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-22.04
            appimage_arch: x86_64
            appimagetool: appimagetool-x86_64.AppImage
          - arch: arm64
            runner: ubuntu-22.04-arm
            appimage_arch: aarch64
            appimagetool: appimagetool-aarch64.AppImage
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Package Linux build
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            npm run build:linux-arm64
          else
            npm run build:linux
          fi

      - name: Stage AppDir
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -e
          BUILD_DIR="dist/discord-video-compressor-linux-${ARCH}"
          APPDIR="dist/AppDir"

          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          cp -r "$BUILD_DIR/." "$APPDIR/usr/bin/"

          cp build/icon-256.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/discord-video-compressor.png"
          cp build/icon-256.png "$APPDIR/discord-video-compressor.png"
          cp build/icon-256.png "$APPDIR/.DirIcon"

          cat > "$APPDIR/usr/share/applications/discord-video-compressor.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=Discord Video Compressor
          Exec=discord-video-compressor
          Icon=discord-video-compressor
          Categories=AudioVideo;Video;
          Terminal=false
          EOF
          cp "$APPDIR/usr/share/applications/discord-video-compressor.desktop" "$APPDIR/discord-video-compressor.desktop"

          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          export PATH="$HERE/usr/bin:$PATH"
          exec "$HERE/usr/bin/discord-video-compressor" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

      - name: Build AppImage
        run: |
          set -e
          curl -L -o appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/${{ matrix.appimagetool }}"
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          mkdir -p dist
          ARCH=${{ matrix.appimage_arch }} ./squashfs-root/AppRun \
            dist/AppDir \
            "dist/DiscordVideoCompressor-${{ github.ref_name }}-${{ matrix.appimage_arch }}.AppImage"

      - name: Tarball Linux build
        run: |
          tar -czf "dist/discord-video-compressor-linux-${{ matrix.arch }}.tar.gz" \
            -C dist "discord-video-compressor-linux-${{ matrix.arch }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/DiscordVideoCompressor-*.AppImage
            dist/discord-video-compressor-linux-${{ matrix.arch }}.tar.gz
          tag_name: ${{ inputs.tag || github.ref_name }}
          fail_on_unmatched_files: true
