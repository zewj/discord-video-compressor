<!doctype html>
<html lang="en" data-theme="midnight">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>Discord Video Compressor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="aurora" aria-hidden="true">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
  </div>

  <header class="titlebar">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-text">Discord Video Compressor</span>
      <span class="brand-version" id="version-tag">v—</span>
    </div>
    <div class="theme-switch" role="tablist" aria-label="Theme">
      <button class="theme-btn theme-auto" data-theme="auto" title="Follow system" aria-label="Auto theme">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 3a9 9 0 1 0 0 18V3z"/></svg>
      </button>
      <button class="theme-btn" data-theme="midnight" title="Midnight" aria-label="Midnight theme"></button>
      <button class="theme-btn" data-theme="discord" title="Discord" aria-label="Discord theme"></button>
      <button class="theme-btn" data-theme="sunset" title="Sunset" aria-label="Sunset theme"></button>
      <button class="theme-btn" data-theme="forest" title="Forest" aria-label="Forest theme"></button>
      <button class="theme-btn" data-theme="light" title="Light" aria-label="Light theme"></button>
    </div>
  </header>

  <main class="card">
    <nav class="tabs" role="tablist" aria-label="Sections">
      <button class="tab active" role="tab" data-tab="compress" aria-selected="true" title="Ctrl+1">
        <svg class="tab-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 4l14 8-14 8V4z"/>
        </svg>
        Compress
      </button>
      <button class="tab" role="tab" data-tab="encoding" aria-selected="false" title="Ctrl+2">
        <svg class="tab-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.36.16.66.42.86.74"/>
        </svg>
        Encoding
      </button>
      <button class="tab" role="tab" data-tab="system" aria-selected="false" title="Ctrl+3">
        <svg class="tab-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
          <path d="M9 9h6v6H9z"/>
          <path d="M9 1v3M15 1v3M9 20v3M15 20v3M1 9h3M1 15h3M20 9h3M20 15h3"/>
        </svg>
        System
      </button>
      <span class="tab-indicator" aria-hidden="true"></span>
    </nav>

    <div class="tab-panels" id="tab-panels">

      <!-- ===== COMPRESS TAB ===== -->
      <section class="tab-panel active" data-tab="compress">
        <div class="row">
          <label class="field" for="input-path">
            <span class="field-label">Input video <span class="dim-hint">(or drop a file anywhere)</span></span>
            <div class="picker">
              <input id="input-path" type="text" placeholder="Choose a video file..." readonly />
              <button class="btn btn-ghost" id="pick-input">Browse</button>
            </div>
            <div class="source-info" id="source-info" hidden>
              <span id="src-duration">--</span>
              <span class="dot">·</span>
              <span id="src-resolution">--</span>
              <span class="dot">·</span>
              <span id="src-codec">--</span>
              <span class="dot">·</span>
              <span id="src-size">--</span>
            </div>
            <div class="output-line">
              <span class="output-arrow" aria-hidden="true">↳</span>
              <span class="dim-hint">Save to</span>
              <span class="output-display" id="output-display" title="Click to change">—</span>
              <input id="output-path" type="hidden" />
              <button type="button" class="btn-link" id="pick-output">Change</button>
            </div>
          </label>
        </div>

        <div class="row">
          <span class="field-label">Discord tier</span>
          <div class="tiers" role="radiogroup" aria-label="Discord upload tier">
            <label class="tier" data-tier="free">
              <input type="radio" name="tier" value="free" checked />
              <div class="tier-card">
                <div class="tier-title">No Nitro</div>
                <div class="tier-size">10 MB</div>
                <div class="tier-hint">Default Discord limit</div>
              </div>
            </label>
            <label class="tier" data-tier="basic">
              <input type="radio" name="tier" value="basic" />
              <div class="tier-card">
                <div class="tier-title">Nitro Basic</div>
                <div class="tier-size">50 MB</div>
                <div class="tier-hint">Basic subscription</div>
              </div>
            </label>
            <label class="tier" data-tier="nitro">
              <input type="radio" name="tier" value="nitro" />
              <div class="tier-card">
                <div class="tier-title">Nitro</div>
                <div class="tier-size">500 MB</div>
                <div class="tier-hint">Full subscription</div>
              </div>
            </label>
            <label class="tier" data-tier="custom">
              <input type="radio" name="tier" value="custom" />
              <div class="tier-card">
                <div class="tier-title">Custom</div>
                <div class="tier-size" id="custom-tier-display">25 MB</div>
                <div class="tier-hint">Pick your own target</div>
              </div>
            </label>
          </div>

          <div class="custom-mb-row" id="custom-mb-row" hidden>
            <span class="opt-label">Custom target size</span>
            <div class="slider-row">
              <input type="range" id="custom-mb-slider" class="slider"
                     min="1" max="500" step="1" value="25" />
              <div class="slider-value">
                <input type="number" id="custom-mb" min="1" step="1" value="25" />
                <span class="unit">MB</span>
              </div>
            </div>
            <div class="slider-ticks" aria-hidden="true">
              <span>1</span><span>50</span><span>100</span><span>250</span><span>500</span>
            </div>
          </div>
        </div>
      </section>

      <!-- ===== ENCODING TAB ===== -->
      <section class="tab-panel" data-tab="encoding" hidden>
        <div class="options-grid">
          <label class="opt">
            <span class="opt-label">Codec / encoder</span>
            <select id="codec-select" class="select"></select>
            <span class="opt-hint" id="codec-hint">Probing...</span>
          </label>

          <label class="opt">
            <span class="opt-label">Mode</span>
            <div class="seg" role="radiogroup" aria-label="Encoding mode">
              <button type="button" class="seg-btn" data-mode="twopass">Two-pass</button>
              <button type="button" class="seg-btn active" data-mode="fast">Fast (1-pass)</button>
            </div>
            <span class="opt-hint">Two-pass = more accurate size; Fast = quicker</span>
          </label>

          <label class="opt opt-wide">
            <span class="opt-label">Quality preset</span>
            <div class="seg" role="radiogroup" aria-label="Quality preset">
              <button type="button" class="seg-btn" data-preset="fastest">Fastest</button>
              <button type="button" class="seg-btn active" data-preset="balanced">Balanced</button>
              <button type="button" class="seg-btn" data-preset="quality">Max quality</button>
            </div>
            <span class="opt-hint">Slower presets = better quality at the same bitrate</span>
          </label>

          <div class="opt opt-wide">
            <span class="opt-label">Trim <span class="dim-hint">(optional)</span></span>
            <div class="trim-row">
              <input id="trim-start" class="input-time" placeholder="0:00" />
              <span class="dim-hint">to</span>
              <input id="trim-end" class="input-time" placeholder="end" />
              <button type="button" class="btn btn-ghost btn-tiny" id="trim-clear">Clear</button>
            </div>
            <span class="opt-hint" id="trim-hint">--</span>
          </div>

          <label class="opt opt-wide">
            <span class="opt-label">Audio</span>
            <label class="check">
              <input type="checkbox" id="mute-audio" />
              <span class="check-box" aria-hidden="true"></span>
              <span>Strip audio (max video quality)</span>
            </label>
            <span class="opt-hint">All bitrate goes to video. Useful for very short clips.</span>
          </label>
        </div>
      </section>

      <!-- ===== SYSTEM TAB ===== -->
      <section class="tab-panel" data-tab="system" hidden>
        <div class="stats-grid">
          <div class="stat-card">
            <svg class="ring" viewBox="0 0 100 100" aria-hidden="true">
              <circle class="ring-track" cx="50" cy="50" r="42"></circle>
              <circle class="ring-fill" id="cpu-ring" cx="50" cy="50" r="42"></circle>
            </svg>
            <div class="stat-body">
              <div class="stat-title">CPU</div>
              <div class="stat-value" id="cpu-value">0%</div>
              <div class="stat-meta" id="cpu-meta">--</div>
            </div>
          </div>

          <div class="stat-card">
            <svg class="ring" viewBox="0 0 100 100" aria-hidden="true">
              <circle class="ring-track" cx="50" cy="50" r="42"></circle>
              <circle class="ring-fill alt" id="ram-ring" cx="50" cy="50" r="42"></circle>
            </svg>
            <div class="stat-body">
              <div class="stat-title">RAM</div>
              <div class="stat-value" id="ram-value">0%</div>
              <div class="stat-meta" id="ram-meta">-- / --</div>
            </div>
          </div>

          <div class="stat-card wide">
            <div class="stat-body">
              <div class="stat-title">Encoder</div>
              <div class="stat-value" id="enc-value">Idle</div>
              <div class="stat-meta" id="enc-meta">No active ffmpeg</div>
              <div class="mini-bar"><div class="mini-bar-fill" id="enc-bar"></div></div>
            </div>
          </div>
        </div>
      </section>

    </div>

    <!-- Always-visible footer: progress + actions -->
    <div class="card-footer">
      <div class="progress-row">
        <div class="progress" aria-hidden="true">
          <div class="progress-fill" id="progress-fill"></div>
          <div class="progress-shimmer"></div>
        </div>
        <div class="status-line">
          <span id="phase">Ready</span>
          <span id="time-info"></span>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="start-btn" title="Compress (Space)">
          <span class="btn-label">Compress</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
        <button class="btn btn-ghost" id="cancel-btn" disabled title="Cancel (Esc)">Cancel</button>
        <span class="actions-spacer"></span>
        <button class="btn btn-ghost btn-tiny" id="export-log-btn" title="Save the recent ffmpeg log (Ctrl+L)">Export log</button>
      </div>
    </div>
  </main>

  <div class="drop-overlay" id="drop-overlay" aria-hidden="true">
    <div class="drop-pulse"></div>
    <div class="drop-card">
      <div class="drop-icon">
        <svg viewBox="0 0 64 64" width="48" height="48" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M32 8v36"/>
          <path d="M16 28l16-16 16 16"/>
          <path d="M8 56h48"/>
        </svg>
      </div>
      <div class="drop-title">Drop video to compress</div>
    </div>
  </div>

  <div class="toast-stack" id="toasts" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
